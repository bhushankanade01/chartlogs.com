kind = "web"
previewPath = "/"
title = "ChartLogs"
version = "1.0.0"
id = "artifacts/chartlogs"
router = "path"
showBadge = false

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21374

[services.development]
run = "pnpm --filter @workspace/chartlogs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chartlogs", "run", "build" ]
publicDir = "artifacts/chartlogs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21374"
BASE_PATH = "/"
