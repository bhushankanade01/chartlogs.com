openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ChartLogs Trading Journal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: accounts
    description: Trading account management
  - name: trades
    description: Trade management
  - name: journal
    description: Journal entries
  - name: dashboard
    description: Dashboard stats
  - name: analytics
    description: Performance analytics
  - name: market
    description: Market calendar
  - name: tools
    description: Trading tools
  - name: admin
    description: Admin operations
  - name: storage
    description: Object storage upload and serving endpoints
  - name: checklists
    description: Checklist templates and responses
  - name: ai
    description: AI trade reviews and reports
  - name: broker
    description: Broker connection and trade sync via MetaApi

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset email sent (always returns 200 to avoid email enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email address with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid or expired verification token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me/settings:
    patch:
      operationId: updateSettings
      tags: [auth]
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsUpdate"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ACCOUNTS
  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List user's trading accounts
      responses:
        "200":
          description: List of trading accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradingAccount"

    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create a trading account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradingAccountInput"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingAccount"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounts/{id}:
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update a trading account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradingAccountUpdate"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingAccount"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete a trading account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # TRADES
  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List trades with filters
      parameters:
        - name: symbol
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [long, short]
        - name: outcome
          in: query
          schema:
            type: string
            enum: [win, loss, breakeven]
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: accountId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of trades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeListResponse"

    post:
      operationId: createTrade
      tags: [trades]
      summary: Create a new trade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeInput"
      responses:
        "201":
          description: Trade created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trades/{id}:
    get:
      operationId: getTrade
      tags: [trades]
      summary: Get a trade by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trade found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateTrade
      tags: [trades]
      summary: Update a trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeUpdate"
      responses:
        "200":
          description: Trade updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteTrade
      tags: [trades]
      summary: Delete a trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # STORAGE
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/finalize:
    post:
      tags: [storage]
      operationId: finalizeUpload
      summary: Set ownership ACL after client PUT to presigned URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalizeUploadRequest"
      responses:
        "204":
          description: ACL set, upload finalized
        "400":
          description: Missing or invalid objectPath
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Object not found (upload may not have completed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/objects:
    delete:
      tags: [storage]
      operationId: deleteStorageObject
      summary: Delete an uploaded object from storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteObjectRequest"
      responses:
        "204":
          description: Object deleted
        "400":
          description: Missing or invalid objectPath
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an uploaded object (requires authentication)
      security:
        - bearerAuth: []
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trades/import/preview:
    post:
      operationId: previewImport
      tags: [trades]
      summary: Parse a CSV file and return a preview (no insert)
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                columnMap:
                  type: string
                  description: JSON-encoded GenericColumnMap for unknown-format CSV
      responses:
        "200":
          description: Preview of parsed trades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPreviewResponse"
        "400":
          description: Parse error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trades/import:
    post:
      operationId: importTrades
      tags: [trades]
      summary: Import trades from a CSV file
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                columnMap:
                  type: string
                  description: JSON-encoded GenericColumnMap for unknown-format CSV
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTradesResponse"
        "400":
          description: Parse error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # JOURNAL
  /journal:
    get:
      operationId: listJournalEntries
      tags: [journal]
      summary: List journal entries
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, journaled, pending]
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of journal entries with trade data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"

  /journal/{tradeId}:
    get:
      operationId: getJournalEntry
      tags: [journal]
      summary: Get journal entry for a trade
      parameters:
        - name: tradeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: upsertJournalEntry
      tags: [journal]
      summary: Create or update a journal entry
      parameters:
        - name: tradeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalInput"
      responses:
        "200":
          description: Journal entry saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  # DASHBOARD
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [1d, 1w, 1m, 3m, all]
            default: 1m
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/equity-curve:
    get:
      operationId: getEquityCurve
      tags: [dashboard]
      summary: Get equity curve data points
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [1d, 1w, 1m, 3m, all]
            default: 1m
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Equity curve data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquityPoint"

  /dashboard/calendar:
    get:
      operationId: getDashboardCalendar
      tags: [dashboard]
      summary: Get monthly P&L calendar heatmap
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Calendar heatmap
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarDay"

  /dashboard/recent-trades:
    get:
      operationId: getRecentTrades
      tags: [dashboard]
      summary: Get last 5 trades for dashboard
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  # ANALYTICS
  /analytics/performance:
    get:
      operationId: getPerformance
      tags: [analytics]
      summary: Get performance analytics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, 7d, 30d, 3m, 1y, all]
            default: 30d
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, winners, losers]
            default: all
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Performance analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceAnalytics"

  /analytics/by-symbol:
    get:
      operationId: getAnalyticsBySymbol
      tags: [analytics]
      summary: Get performance grouped by symbol
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 3m, 1y, all]
            default: all
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Symbol analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SymbolPerformance"

  /analytics/by-day:
    get:
      operationId: getAnalyticsByDay
      tags: [analytics]
      summary: Get performance grouped by day of week
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 3m, 1y, all]
            default: all
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Day-of-week analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayPerformance"

  /analytics/by-tag:
    get:
      operationId: getAnalyticsByTag
      tags: [analytics]
      summary: Get performance grouped by tag
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Tag analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TagPerformance"

  /analytics/by-emotion:
    get:
      operationId: getAnalyticsByEmotion
      tags: [analytics]
      summary: Get performance grouped by emotion
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Emotion analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmotionPerformance"

  /analytics/by-strategy:
    get:
      operationId: getAnalyticsByStrategy
      tags: [analytics]
      summary: Get performance grouped by strategy
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Strategy analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyPerformance"

  /analytics/by-session:
    get:
      operationId: getAnalyticsBySession
      tags: [analytics]
      summary: Get performance grouped by trading session
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 3m, 1y, all]
            default: all
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Session analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionPerformance"

  /analytics/by-hour:
    get:
      operationId: getAnalyticsByHour
      tags: [analytics]
      summary: Get performance heatmap by hour-of-day and day-of-week
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 3m, 1y, all]
            default: all
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Hour-of-day performance heatmap
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourHeatmapPoint"

  /analytics/r-multiples:
    get:
      operationId: getAnalyticsRMultiples
      tags: [analytics]
      summary: Get R-multiple distribution histogram
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 3m, 1y, all]
            default: all
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: R-multiple histogram buckets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RMultipleStats"

  /analytics/streaks:
    get:
      operationId: getAnalyticsStreaks
      tags: [analytics]
      summary: Get win/loss streak statistics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 3m, 1y, all]
            default: all
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Streak statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakStats"

  /analytics/profit-factor-trend:
    get:
      operationId: getAnalyticsProfitFactorTrend
      tags: [analytics]
      summary: Get monthly profit factor trend
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 3m, 1y, all]
            default: all
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Monthly profit factor trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfitFactorPoint"

  /analytics/checklist-compliance:
    get:
      operationId: getChecklistCompliance
      tags: [analytics]
      summary: Get checklist compliance stats per template
      security:
        - bearerAuth: []
      parameters:
        - name: accountId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Compliance statistics per checklist template
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChecklistCompliance"

  # AI
  /ai/status:
    get:
      operationId: getAiStatus
      tags: [ai]
      summary: Check if AI features are available
      responses:
        "200":
          description: AI status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiStatus"

  /ai/trade-review/{tradeId}:
    post:
      operationId: generateAiTradeReview
      tags: [ai]
      summary: Generate an AI review for a trade (SSE stream)
      parameters:
        - name: tradeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of AI review content
          content:
            text/event-stream: {}
        "404":
          description: Trade not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/weekly-report:
    post:
      operationId: generateWeeklyReport
      tags: [ai]
      summary: Generate a weekly performance report
      responses:
        "200":
          description: Generated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiReport"
        "503":
          description: AI not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/patterns:
    get:
      operationId: getPatternAnalysis
      tags: [ai]
      summary: Get the latest cached pattern analysis (no regeneration)
      responses:
        "200":
          description: Latest pattern analysis report or null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AiReport"
                  - type: "null"
    post:
      operationId: generatePatternAnalysis
      tags: [ai]
      summary: Generate pattern analysis from last 30 trades
      responses:
        "200":
          description: Pattern analysis report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiReport"
        "503":
          description: AI not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/reports:
    get:
      operationId: listAiReports
      tags: [ai]
      summary: List stored AI reports
      parameters:
        - name: reportType
          in: query
          schema:
            type: string
            enum: [trade_review, weekly_report, pattern_analysis]
        - name: tradeId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of AI reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiReport"

  # CHECKLISTS
  /checklists/templates:
    get:
      operationId: listChecklistTemplates
      tags: [checklists]
      summary: List checklist templates for the current user
      responses:
        "200":
          description: List of checklist templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChecklistTemplate"

    post:
      operationId: createChecklistTemplate
      tags: [checklists]
      summary: Create a checklist template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChecklistTemplateInput"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistTemplate"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checklists/templates/{id}:
    patch:
      operationId: updateChecklistTemplate
      tags: [checklists]
      summary: Update a checklist template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChecklistTemplateUpdate"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistTemplate"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteChecklistTemplate
      tags: [checklists]
      summary: Delete a checklist template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /checklists/responses/{tradeId}:
    get:
      operationId: getChecklistResponses
      tags: [checklists]
      summary: Get checklist responses for a trade
      parameters:
        - name: tradeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checklist responses for trade
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChecklistResponse"

    put:
      operationId: upsertChecklistResponse
      tags: [checklists]
      summary: Save checklist responses for a trade
      parameters:
        - name: tradeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChecklistResponseInput"
      responses:
        "200":
          description: Response saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistResponse"

  # MARKET
  /market/calendar:
    get:
      operationId: getMarketCalendar
      tags: [market]
      summary: Get economic calendar events
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, tomorrow, this_week, all]
            default: today
        - name: impact
          in: query
          schema:
            type: string
            enum: [high, medium, low, all]
            default: all
        - name: currency
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Economic calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EconomicEvent"

  # BROKER
  /broker/connect:
    post:
      operationId: connectBroker
      tags: [broker]
      summary: Connect a MetaTrader broker account via MetaApi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerConnectInput"
      responses:
        "201":
          description: Broker connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerConnection"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Connection already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: MetaApi registration failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /broker/status:
    get:
      operationId: getBrokerStatus
      tags: [broker]
      summary: Get current broker connection status
      responses:
        "200":
          description: Current broker connection (or null if none)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerStatusResponse"

  /broker/sync:
    post:
      operationId: syncBroker
      tags: [broker]
      summary: Manually trigger a broker trade sync
      responses:
        "200":
          description: Sync triggered (or skipped if not connected)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: No broker connection found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Broker not yet connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /broker/disconnect:
    delete:
      operationId: disconnectBroker
      tags: [broker]
      summary: Disconnect and remove broker account
      responses:
        "204":
          description: Disconnected
        "404":
          description: No connection found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # TOOLS
  /tools/position-size:
    post:
      operationId: calculatePositionSize
      tags: [tools]
      summary: Calculate position size
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PositionSizeInput"
      responses:
        "200":
          description: Position size calculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionSizeResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    # AUTH
    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, name, plan, role, isActive, timezone, currency, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        plan:
          type: string
          enum: [free, pro, elite]
        role:
          type: string
          enum: [user, admin]
        isActive:
          type: boolean
        emailVerified:
          type: boolean
        lastLogin:
          type: ["string", "null"]
        subscriptionExpiresAt:
          type: ["string", "null"]
        timezone:
          type: string
        currency:
          type: string
        defaultLotSize:
          type: ["number", "null"]
        createdAt:
          type: string

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8

    VerifyEmailInput:
      type: object
      required: [token]
      properties:
        token:
          type: string

    UserSettingsUpdate:
      type: object
      properties:
        name:
          type: string
        timezone:
          type: string
        currency:
          type: string
        defaultLotSize:
          type: ["number", "null"]

    # ACCOUNTS
    TradingAccount:
      type: object
      required: [id, userId, name, platform, startingBalance, currency, isDefault, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        broker:
          type: ["string", "null"]
        platform:
          type: string
          enum: [manual, mt4, mt5]
        startingBalance:
          type: number
        currency:
          type: string
        isDefault:
          type: boolean
        totalPnl:
          type: number
        tradeCount:
          type: integer
        createdAt:
          type: string

    TradingAccountInput:
      type: object
      required: [name, platform, startingBalance, currency]
      properties:
        name:
          type: string
        broker:
          type: ["string", "null"]
        platform:
          type: string
          enum: [manual, mt4, mt5]
        startingBalance:
          type: number
        currency:
          type: string
        isDefault:
          type: boolean

    TradingAccountUpdate:
      type: object
      properties:
        name:
          type: string
        broker:
          type: ["string", "null"]
        platform:
          type: string
          enum: [manual, mt4, mt5]
        startingBalance:
          type: number
        currency:
          type: string
        isDefault:
          type: boolean

    # TRADES
    Trade:
      type: object
      required: [id, userId, symbol, type, entryPrice, positionSize, openTime, source, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        accountId:
          type: ["integer", "null"]
        symbol:
          type: string
        type:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        positionSize:
          type: number
        stopLoss:
          type: ["number", "null"]
        takeProfit:
          type: ["number", "null"]
        openTime:
          type: string
        closeTime:
          type: ["string", "null"]
        pnl:
          type: ["number", "null"]
        pips:
          type: ["number", "null"]
        rrRatio:
          type: ["number", "null"]
        rMultiple:
          type: ["number", "null"]
        fees:
          type: ["number", "null"]
        source:
          type: string
          enum: [manual, mt4, mt5, csv]
        tags:
          type: array
          items:
            type: string
        emotion:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        screenshots:
          type: array
          items:
            type: string
        outcome:
          type: ["string", "null"]
          enum: [win, loss, breakeven, null]
        strategy:
          type: ["string", "null"]
        session:
          type: ["string", "null"]
          enum: [London, NewYork, Asian, Sydney, OffHours, null]
        rating:
          type: ["integer", "null"]
          minimum: 1
          maximum: 5
        createdAt:
          type: string

    TradeInput:
      type: object
      required: [symbol, type, entryPrice, positionSize, openTime]
      properties:
        accountId:
          type: ["integer", "null"]
        symbol:
          type: string
        type:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        positionSize:
          type: number
        stopLoss:
          type: ["number", "null"]
        takeProfit:
          type: ["number", "null"]
        openTime:
          type: string
        closeTime:
          type: ["string", "null"]
        fees:
          type: ["number", "null"]
        source:
          type: string
          enum: [manual, mt4, mt5, csv]
        tags:
          type: array
          items:
            type: string
        emotion:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        screenshots:
          type: array
          items:
            type: string
        strategy:
          type: ["string", "null"]
        session:
          type: ["string", "null"]
          enum: [London, NewYork, Asian, Sydney, OffHours, null]
        rating:
          type: ["integer", "null"]
          minimum: 1
          maximum: 5
        rMultiple:
          type: ["number", "null"]

    TradeUpdate:
      type: object
      properties:
        accountId:
          type: ["integer", "null"]
        symbol:
          type: string
        type:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        positionSize:
          type: number
        stopLoss:
          type: ["number", "null"]
        takeProfit:
          type: ["number", "null"]
        openTime:
          type: string
        closeTime:
          type: ["string", "null"]
        fees:
          type: ["number", "null"]
        source:
          type: string
          enum: [manual, mt4, mt5, csv]
        tags:
          type: array
          items:
            type: string
        emotion:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        screenshots:
          type: array
          items:
            type: string
        strategy:
          type: ["string", "null"]
        session:
          type: ["string", "null"]
          enum: [London, NewYork, Asian, Sydney, OffHours, null]
        rating:
          type: ["integer", "null"]
          minimum: 1
          maximum: 5
        rMultiple:
          type: ["number", "null"]

    TradeListResponse:
      type: object
      required: [trades, total]
      properties:
        trades:
          type: array
          items:
            $ref: "#/components/schemas/Trade"
        total:
          type: integer

    # JOURNAL
    JournalEntry:
      type: object
      required: [id, tradeId, userId, createdAt]
      properties:
        id:
          type: integer
        tradeId:
          type: integer
        userId:
          type: integer
        notes:
          type: ["string", "null"]
        mood:
          type: ["string", "null"]
        screenshots:
          type: array
          items:
            type: string
        trade:
          $ref: "#/components/schemas/Trade"
        createdAt:
          type: string
        updatedAt:
          type: string

    JournalInput:
      type: object
      properties:
        notes:
          type: ["string", "null"]
        mood:
          type: ["string", "null"]
        screenshots:
          type: array
          items:
            type: string

    # DASHBOARD
    DashboardStats:
      type: object
      required: [totalPnl, realizedPnl, unrealizedPnl, winRate, totalTrades, openTrades, avgWinner, avgLoser, bestTrade, worstTrade, winStreak, lossStreak, avgRR, profitFactor, expectancy]
      properties:
        totalPnl:
          type: number
        realizedPnl:
          type: number
        unrealizedPnl:
          type: number
        winRate:
          type: number
        totalTrades:
          type: integer
        openTrades:
          type: integer
        avgWinner:
          type: number
        avgLoser:
          type: number
        bestTrade:
          type: number
        worstTrade:
          type: number
        winStreak:
          type: integer
        lossStreak:
          type: integer
        avgRR:
          type: number
        profitFactor:
          type: number
        expectancy:
          type: number

    EquityPoint:
      type: object
      required: [date, equity, pnl]
      properties:
        date:
          type: string
        equity:
          type: number
        pnl:
          type: number

    CalendarDay:
      type: object
      required: [date, pnl, tradeCount]
      properties:
        date:
          type: string
        pnl:
          type: number
        tradeCount:
          type: integer

    # ANALYTICS
    PerformanceAnalytics:
      type: object
      required: [totalPnl, winRate, profitFactor, expectancy, totalTrades, winners, losers, longTrades, shortTrades, equityCurve, drawdown]
      properties:
        totalPnl:
          type: number
        winRate:
          type: number
        profitFactor:
          type: number
        expectancy:
          type: number
        totalTrades:
          type: integer
        winners:
          type: integer
        losers:
          type: integer
        breakeven:
          type: integer
        longTrades:
          type: integer
        shortTrades:
          type: integer
        longPnl:
          type: number
        shortPnl:
          type: number
        longWinRate:
          type: number
        shortWinRate:
          type: number
        maxConsecutiveLosses:
          type: integer
        maxDrawdownDuration:
          type: integer
          description: Max drawdown duration in days
        equityCurve:
          type: array
          items:
            $ref: "#/components/schemas/EquityPoint"
        drawdown:
          type: array
          items:
            $ref: "#/components/schemas/DrawdownPoint"

    DrawdownPoint:
      type: object
      required: [date, drawdown]
      properties:
        date:
          type: string
        drawdown:
          type: number

    SymbolPerformance:
      type: object
      required: [symbol, trades, pnl, winRate]
      properties:
        symbol:
          type: string
        trades:
          type: integer
        pnl:
          type: number
        winRate:
          type: number

    DayPerformance:
      type: object
      required: [day, trades, pnl, winRate]
      properties:
        day:
          type: string
        trades:
          type: integer
        pnl:
          type: number
        winRate:
          type: number

    TagPerformance:
      type: object
      required: [tag, trades, pnl, winRate]
      properties:
        tag:
          type: string
        trades:
          type: integer
        pnl:
          type: number
        winRate:
          type: number

    EmotionPerformance:
      type: object
      required: [emotion, trades, pnl, winRate]
      properties:
        emotion:
          type: string
        trades:
          type: integer
        pnl:
          type: number
        winRate:
          type: number

    # MARKET
    EconomicEvent:
      type: object
      required: [id, time, country, currency, impact, event]
      properties:
        id:
          type: string
        time:
          type: string
        country:
          type: string
        currency:
          type: string
        impact:
          type: string
          enum: [high, medium, low]
        event:
          type: string
        actual:
          type: ["string", "null"]
        forecast:
          type: ["string", "null"]
        previous:
          type: ["string", "null"]

    # IMPORT
    ImportPreviewRow:
      type: object
      required: [symbol, type, entryPrice, positionSize, openTime]
      properties:
        symbol:
          type: string
        type:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        positionSize:
          type: number
        openTime:
          type: string
        closeTime:
          type: ["string", "null"]
        pnl:
          type: ["number", "null"]
        fees:
          type: ["number", "null"]
        warning:
          type: string

    ImportPreviewResponse:
      type: object
      required: [format, rowCount, preview, rawHeaders, rawRows]
      properties:
        format:
          type: string
          enum: [mt4, mt5, csv, unknown]
        rowCount:
          type: integer
        preview:
          type: array
          items:
            $ref: "#/components/schemas/ImportPreviewRow"
        rawHeaders:
          type: array
          items:
            type: string
        rawRows:
          type: array
          items:
            type: array
            items:
              type: string

    ImportTradesResponse:
      type: object
      required: [imported, skipped, invalidRows, errors, format]
      properties:
        imported:
          type: integer
        skipped:
          type: integer
          description: Number of rows skipped because they are duplicates of existing trades
        invalidRows:
          type: integer
          description: Number of rows skipped because of missing or unparseable fields
        errors:
          type: array
          items:
            type: string
        format:
          type: string
          enum: [mt4, mt5, csv, unknown]

    # STORAGE
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string

    DeleteObjectRequest:
      type: object
      required: [objectPath]
      properties:
        objectPath:
          type: string
          minLength: 1

    FinalizeUploadRequest:
      type: object
      required: [objectPath]
      properties:
        objectPath:
          type: string
          minLength: 1

    # TOOLS
    PositionSizeInput:
      type: object
      required: [accountBalance, riskPercent, stopLossPips, pair]
      properties:
        accountBalance:
          type: number
        riskPercent:
          type: number
        stopLossPips:
          type: number
        pair:
          type: string

    PositionSizeResult:
      type: object
      required: [lotSize, units, dollarRisk, pipValue]
      properties:
        lotSize:
          type: number
        units:
          type: number
        dollarRisk:
          type: number
        pipValue:
          type: number

    # ANALYTICS (new)
    StrategyPerformance:
      type: object
      required: [strategy, trades, pnl, winRate, avgRMultiple]
      properties:
        strategy:
          type: string
        trades:
          type: integer
        pnl:
          type: number
        winRate:
          type: number
        avgRMultiple:
          type: ["number", "null"]

    SessionPerformance:
      type: object
      required: [session, trades, pnl, winRate]
      properties:
        session:
          type: string
        trades:
          type: integer
        pnl:
          type: number
        winRate:
          type: number

    HourHeatmapPoint:
      type: object
      required: [day, hour, avgPnl, trades]
      properties:
        day:
          type: integer
          description: 0=Sunday, 6=Saturday
        hour:
          type: integer
          description: 0-23 UTC hour
        avgPnl:
          type: number
        trades:
          type: integer

    RMultipleBucket:
      type: object
      required: [label, count]
      properties:
        label:
          type: string
        count:
          type: integer

    RMultipleStats:
      type: object
      required: [buckets, avgRMultiple, totalTrades]
      properties:
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/RMultipleBucket"
        avgRMultiple:
          type: ["number", "null"]
        totalTrades:
          type: integer

    StreakPoint:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [win, loss, breakeven]

    StreakStats:
      type: object
      required: [currentStreak, currentType, bestWinStreak, worstLossStreak, timeline]
      properties:
        currentStreak:
          type: integer
        currentType:
          type: ["string", "null"]
          enum: [win, loss, breakeven, null]
        bestWinStreak:
          type: integer
        worstLossStreak:
          type: integer
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/StreakPoint"

    ProfitFactorPoint:
      type: object
      required: [month, profitFactor, trades]
      properties:
        month:
          type: string
        profitFactor:
          type: number
        trades:
          type: integer

    ChecklistCompliance:
      type: object
      required: [templateId, templateName, totalResponses, avgComplianceRate]
      properties:
        templateId:
          type: integer
        templateName:
          type: string
        totalResponses:
          type: integer
        avgComplianceRate:
          type: number
          description: Average percentage of items checked (0-100)

    # CHECKLISTS
    ChecklistQuestion:
      type: object
      required: [id, text]
      properties:
        id:
          type: string
        text:
          type: string

    ChecklistTemplate:
      type: object
      required: [id, userId, name, questions, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ChecklistQuestion"
        createdAt:
          type: string
        updatedAt:
          type: string

    ChecklistTemplateInput:
      type: object
      required: [name, questions]
      properties:
        name:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ChecklistQuestion"

    ChecklistTemplateUpdate:
      type: object
      properties:
        name:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ChecklistQuestion"

    ChecklistAnswer:
      type: object
      required: [questionId, checked]
      properties:
        questionId:
          type: string
        checked:
          type: boolean

    ChecklistResponse:
      type: object
      required: [id, userId, tradeId, templateId, answers, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        tradeId:
          type: integer
        templateId:
          type: integer
        answers:
          type: array
          items:
            $ref: "#/components/schemas/ChecklistAnswer"
        createdAt:
          type: string
        updatedAt:
          type: string

    ChecklistResponseInput:
      type: object
      required: [templateId, answers]
      properties:
        templateId:
          type: integer
        answers:
          type: array
          items:
            $ref: "#/components/schemas/ChecklistAnswer"

    # AI
    AiStatus:
      type: object
      required: [available]
      properties:
        available:
          type: boolean
        message:
          type: string

    AiReport:
      type: object
      required: [id, reportType, content, createdAt]
      properties:
        id:
          type: integer
        tradeId:
          type: integer
          nullable: true
        reportType:
          type: string
          enum: [trade_review, weekly_report, pattern_analysis]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    # BROKER
    BrokerConnectInput:
      type: object
      required: [accountNumber, serverName, investorPassword, brokerType]
      properties:
        accountNumber:
          type: string
          description: MT4/MT5 account number
        serverName:
          type: string
          description: Broker server name (e.g. ICMarkets-Live)
        investorPassword:
          type: string
          description: Investor (read-only) password — never stored
        brokerType:
          type: string
          enum: [mt4, mt5]

    BrokerConnection:
      type: object
      required: [id, brokerType, accountNumber, serverName, status, createdAt]
      properties:
        id:
          type: integer
        brokerType:
          type: string
          enum: [mt4, mt5]
        accountNumber:
          type: string
        serverName:
          type: string
        status:
          type: string
          enum: [pending, connected, error, disconnecting]
        metaapiState:
          type: string
          description: MetaApi account deployment state (DEPLOYING, DEPLOYED, etc.)
        lastSyncAt:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string

    BrokerStatusResponse:
      type: object
      required: [connection]
      properties:
        connection:
          oneOf:
            - $ref: "#/components/schemas/BrokerConnection"
            - type: "null"
